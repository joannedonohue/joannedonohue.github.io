<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solara Superfruit Chews — Amazon Launch Case Study | Joanne Donohue</title>
  <meta name="description" content="Amazon launch case study for Solara Superfruit Chews — a fictional wellness brand. Product positioning, listing strategy, competitive analysis, and 90-day test-and-learn plan.">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>">
  <style>
    .solara-embed-page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .solara-embed-page .nav {
      flex-shrink: 0;
    }
    .gamma-frame-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .gamma-frame-wrap iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    /* Fallback message if iframe is blocked */
    .gamma-fallback {
      display: none;
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, #FFF5DE 0%, #FFE8C8 30%, #FFD4B8 60%, #FFBFA8 100%);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      text-align: center;
      padding: 2rem;
    }
    .gamma-fallback p {
      font-family: var(--sans);
      font-size: 1rem;
      color: #555;
    }
    .gamma-fallback a {
      display: inline-block;
      background: #1A1A1A;
      color: #fff;
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.85rem 2rem;
      border-radius: 2px;
      text-decoration: none;
    }
  </style>
</head>
<body class="solara-embed-page">

<!-- Navigation -->
<nav class="nav" id="nav">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo">Joanne Donohue</a>
    <div class="nav-links" id="navLinks">
      <a href="index.html#about">About</a>
      <a href="index.html#work">Work</a>
      <a href="index.html#writing">Writing</a>
      <a href="index.html#creative">Creative</a>
      <a href="index.html#contact" class="nav-cta">Get in Touch</a>
    </div>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="gamma-frame-wrap">
  <iframe
    src="https://solara-superfruit-chews-fximhsr.gamma.site/"
    title="Solara Superfruit Chews — Amazon Launch Case Study"
    allowfullscreen
    loading="eager"
    id="gammaFrame"
  ></iframe>
  <div class="gamma-fallback" id="gammaFallback">
    <p>View the full case study on Gamma</p>
    <a href="https://solara-superfruit-chews-fximhsr.gamma.site/" target="_blank" rel="noopener">Open Case Study ↗</a>
  </div>
</div>

<script>
  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 40));

  const toggle = document.getElementById('navToggle');
  const links = document.getElementById('navLinks');
  toggle.addEventListener('click', () => links.classList.toggle('open'));
  links.querySelectorAll('a').forEach(a => a.addEventListener('click', () => links.classList.remove('open')));

  // If the iframe fails to load (blocked), show fallback
  const frame = document.getElementById('gammaFrame');
  const fallback = document.getElementById('gammaFallback');
  frame.addEventListener('error', () => {
    fallback.style.display = 'flex';
    frame.style.display = 'none';
  });
</script>

</body>
</html>
